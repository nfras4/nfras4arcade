<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Crown emblem - gold, recognizable at 18px -->
  <!-- Crown base band -->
  <rect x="3" y="15" width="18" height="5" rx="1" fill="#ffd700"/>
  <!-- Crown points polygon -->
  <polygon points="3,15 3,8 7,12 12,5 17,12 21,8 21,15" fill="#ffd700"/>
  <!-- Jewel highlights -->
  <circle cx="12" cy="9" r="1.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="5.5" cy="13" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="18.5" cy="13" r="1" fill="#ffffff" opacity="0.7"/>
  <!-- Bottom band shine -->
  <rect x="3" y="15" width="18" height="1.5" rx="0.5" fill="#fff8c0" opacity="0.6"/>
  <!-- Dark outline for contrast on light backgrounds -->
  <rect x="3" y="15" width="18" height="5" rx="1" fill="none" stroke="#b8860b" stroke-width="0.75"/>
  <polygon points="3,15 3,8 7,12 12,5 17,12 21,8 21,15" fill="none" stroke="#b8860b" stroke-width="0.75"/>
</svg>
